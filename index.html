<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Losowy Quiz Sieciowy</title>

<style>
body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #333;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #000;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
}

body::before, body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background-image: url('https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/bidul.jpg?raw=true');
    background-size: cover;
    background-position: center;
    opacity: 0.2;
    pointer-events: none;
}

@media (min-width: 1025px) {
    body::before {
        animation: glitchMain 4s linear infinite, infiniteScroll 10s linear infinite;
        opacity: 0.4;
    }
    body::after {
        z-index: -3;
        opacity: 0.15;
        animation: explode 3s steps(2) infinite;
        filter: contrast(150%) brightness(1.2);
    }
}

.main-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1400px;
    padding: 15px;
    box-sizing: border-box;
}

@media (min-width: 1100px) {
    .main-wrapper {
        flex-direction: row;
        padding: 40px;
    }
}

.quiz-container {
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    width: 100%;
    max-width: 700px;
    padding: 20px;
    box-sizing: border-box;
    z-index: 5;
    backdrop-filter: blur(8px);
}

@media (min-width: 768px) {
    .quiz-container {
        padding: 30px;
    }
}

.side-gif {
    display: none;
    width: 300px;
    height: 600px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

@media (min-width: 1100px) {
    .side-gif { display: block; }
}

.dvd-container {
    display: none;
}

@media (min-width: 1025px) {
    .dvd-container {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
    }
}

.dvd-image {
    position: absolute;
    width: 180px;
    height: auto;
    opacity: 1;
}

.quiz-header {
    border-bottom: 2px solid #eee;
    padding-bottom: 15px;
    margin-bottom: 25px;
    text-align: center;
}

@media (min-width: 600px) {
    .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: left;
    }
}

.quiz-header h1 {
    margin: 0;
    color: #2c3e50;
    font-size: 1.5em;
}

.stats {
    font-size: 0.9em;
    color: #7f8c8d;
    font-weight: bold;
}

.question {
    font-size: 1.25em;
    font-weight: 600;
    margin-bottom: 10px;
    color: #2c3e50;
    line-height: 1.4;
}

.hint {
    font-size: 0.9em;
    color: #e67e22;
    margin-bottom: 20px;
    font-weight: bold;
}

.options-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.option {
    background-color: #f9f9f9;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    padding: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    font-size: 1.05em;
    user-select: none;
    min-height: 50px;
}

@media (hover: hover) {
    .option:hover:not(.disabled) {
        background-color: #e8f4fd;
        border-color: #3498db;
    }
}

.option.selected:not(.disabled) {
    background-color: #d6eaf8;
    border-color: #2980b9;
}

.option.correct {
    background-color: #d4efdf !important;
    border-color: #27ae60 !important;
    color: #1e8449;
}

.option.incorrect {
    background-color: #fadbd8 !important;
    border-color: #e74c3c !important;
    color: #c0392b;
}

.option.disabled { cursor: not-allowed; }
.option input { display: none; }

.btn-container {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

@media (min-width: 480px) {
    .btn-container { flex-direction: row; }
}

.btn {
    background-color: #3498db;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 25px;
    font-size: 1.1em;
    cursor: pointer;
    transition: background-color 0.3s;
    flex: 1;
    font-weight: bold;
}

.btn:active { transform: scale(0.98); }
.btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
.btn.next-btn { background-color: #27ae60; display: none; }

.results { text-align: center; display: none; }
.score-big { 
    font-size: 2.5em; 
    font-weight: bold; 
    color: #27ae60; 
    margin: 20px 0;
}

@keyframes infiniteScroll {
    from { background-position: 0 0; }
    to { background-position: -100% 0; }
}

@keyframes glitchMain {
    0%, 100% { transform: scale(1) translate(0); }
    94% { transform: scale(1.05) translate(-5px, 5px); }
}

@keyframes explode {
    0%, 100% { clip-path: inset(0 0 0 0); }
    50% { clip-path: inset(20% 0 40% 0); }
}

.correct-anim { animation: correctFlash 0.6s ease; }
.wrong-anim { animation: wrongShake 0.4s ease; }

@keyframes correctFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); background-color:#2ecc71; }
    100% { transform: scale(1); }
}

@keyframes wrongShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
    100% { transform: translateX(0); }
}

.particle {
    position: fixed;
    width: 100px;
    height: 100px;
    pointer-events: none;
    z-index: 9999;
    animation: fly 1.2s ease-out forwards;
}

@media (min-width: 768px) {
    .particle { width: 400px; height: 400px; }
}

@keyframes fly {
    0% { transform: scale(0.5); opacity:1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.2); opacity:0; }
}

@keyframes bounceX { from { left: 0; } to { left: calc(100vw - 180px); } }
@keyframes bounceY { from { top: 0; } to { top: calc(100vh - 140px); } }

.img1 { animation: bounceX 7.3s linear infinite alternate, bounceY 5.1s linear infinite alternate; }
.img2 { animation: bounceX 10.5s linear infinite alternate, bounceY 4.2s linear infinite alternate; animation-delay: -2s; }
.img3 { animation: bounceX 8.7s linear infinite alternate, bounceY 6.8s linear infinite alternate; animation-delay: -5s; }
</style>
</head>

<body>

<audio id="sound-correct" src="https://raw.githubusercontent.com/majchrzakp2005/majchrzakp2005.github.io/main/pach.mp3"></audio>
<audio id="sound-wrong" src="https://raw.githubusercontent.com/majchrzakp2005/majchrzakp2005.github.io/main/zwatpienie.mp3"></audio>
<div class="dvd-container">
    <img src="https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/bidul.jpg?raw=true" class="dvd-image img1" alt="Bouncing 1">
    <img src="https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/nowybidul.png?raw=true" class="dvd-image img2" alt="Bouncing 2">
    <img src="https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/bidultrzeci.JPEG?raw=true" class="dvd-image img3" alt="Bouncing 3">
</div>
<div class="main-wrapper">
    <img src="https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/pierwszy.gif?raw=true" alt="Network" class="side-gif">

    <div class="quiz-container" id="quizBox">
        <div class="quiz-header">
            <h1>Quiz CCNA / Sieci</h1>
            <div class="stats">
                Wynik: <span id="current-score">0</span> |
                Pytanie: <span id="question-counter">1</span>/<span id="total-questions">0</span>
            </div>
        </div>

        <div id="quiz-block">
            <div class="question" id="question">Ładowanie...</div>
            <div class="hint" id="multi-hint"></div>
            <div class="options-container" id="options"></div>

            <div class="btn-container">
                <button class="btn" id="check-btn" onclick="checkAnswer()" disabled>Sprawdź</button>
                <button class="btn next-btn" id="next-btn" onclick="loadNextQuestion()">Następne</button>
            </div>
        </div>

        <div class="results" id="results-block">
            <h2>Koniec!</h2>
            <p>Wynik:</p>
            <div class="score-big">
                <span id="final-score"></span> / <span id="final-total"></span>
            </div>
            <button class="btn" onclick="restartQuiz()">Restart</button>
        </div>
    </div>

    <img src="https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/drugi.gif?raw=true" alt="Server" class="side-gif">
</div>

<script>
const allQuizData = [
    { q: "Która informacja jest używana przez routery do przekazywania pakietu danych w kierunku jego celu?", opts: ["źródłowy adres IP", "docelowy adres IP", "źródłowy adres warstwy łącza danych", "docelowy adres warstwy łącza danych"], ans: [1], type: "single" },
    { q: "Komputer musi wysłać pakiet do hosta docelowego w tej samej sieci LAN. Jak zostanie wysłany pakiet?", opts: ["Pakiet zostanie wysłany najpierw do bramy domyślnej, a następnie, w zależności od odpowiedzi z bramy, może zostać wysłany do hosta docelowego.", "Pakiet zostanie wysłany bezpośrednio do hosta docelowego.", "Pakiet zostanie wysłany najpierw do bramy domyślnej, a następnie z bramy domyślnej zostanie wysłany bezpośrednio do hosta docelowego.", "Pakiet zostanie wysłany tylko do bramy domyślnej."], ans: [1], type: "single" },
    { q: "Router otrzymuje pakiet przez interfejs Gigabit 0/0 i decyduje, że musi on zostać przekazany przez interfejs Gigabit 0/1. Co router zrobi dalej?", opts: ["skieruje pakiet przez interfejs Gigabit 0/1", "utworzy nową ramkę Ethernet warstwy 2, która zostanie wysłana do celu", "zajrzy do pamięci podręcznej ARP, aby określić docelowy adres IP", "zajrzy do tablicy routingu, aby ustalić, czy sieć docelowa znajduje się w tablicy routingu"], ans: [1], type: "single" },
    { q: "Którego adresu IPv4 może użyć host, aby spingować interfejs loopback?", opts: ["126.0.0.1", "127.0.0.0", "126.0.0.0", "127.0.0.1"], ans: [3], type: "single" },
    { q: "Komputer może uzyskać dostęp do urządzeń w tej samej sieci, ale nie może uzyskać dostępu do urządzeń w innych sieciach. Co jest prawdopodobną przyczyną tego problemu?", opts: ["Kabel nie jest prawidłowo podłączony do karty sieciowej (NIC).", "Komputer ma nieprawidłowy adres IP.", "Komputer ma nieprawidłową maskę podsieci.", "Komputer ma nieprawidłowy adres bramy domyślnej."], ans: [3], type: "single" },
    { q: "Które stwierdzenie opisuje cechę protokołu IP?", opts: ["Hermetyzacja IP jest modyfikowana w zależności od mediów sieciowych.", "IP polega na protokołach warstwy 2 w zakresie kontroli błędów transmisji.", "Adresy MAC są używane podczas hermetyzacji pakietów IP.", "IP polega na usługach warstw wyższych w celu obsługi sytuacji związanych z brakującymi pakietami lub pakietami odebranymi w złej kolejności."], ans: [3], type: "single" },
    { q: "Dlaczego NAT nie jest potrzebny w IPv6?", opts: ["Ponieważ IPv6 ma zintegrowane zabezpieczenia, nie ma potrzeby ukrywania adresów IPv6 sieci wewnętrznych.", "Każdy host lub użytkownik może otrzymać publiczny adres sieciowy IPv6, ponieważ liczba dostępnych adresów IPv6 jest niezwykle duża.", "Problemy wywoływane przez aplikacje NAT są rozwiązane, ponieważ nagłówek IPv6 usprawnia obsługę pakietów przez routery pośredniczące.", "Problemy z łącznością typu end-to-end spowodowane przez NAT są rozwiązane, ponieważ liczba tras rośnie wraz z liczbą węzłów podłączonych do Internetu."], ans: [1], type: "single" },
    { q: "Którego parametru używa router do wyboru ścieżki do celu, gdy dostępnych jest wiele tras?", opts: ["niższa wartość metryki powiązana z siecią docelową", "niższy adres IP bramy prowadzącej do sieci docelowej", "wyższa wartość metryki powiązana z siecią docelową", "wyższy adres IP bramy prowadzącej do sieci docelowej"], ans: [0], type: "single" },
    { q: "Jakie są dwie usługi świadczone przez warstwę sieci OSI? (Wybierz dwie).", opts: ["wykonywanie wykrywania błędów", "routing pakietów w kierunku celu", "hermetyzacja jednostek PDU z warstwy transportowej", "umieszczanie ramek na nośniku", "wykrywanie kolizji"], ans: [1, 2], type: "multiple" },
    { q: "Jaki jest cel skonfigurowania adresu bramy domyślnej na przełączniku w sieci produkcyjnej?", opts: ["Hosty podłączone do przełącznika mogą używać adresu bramy domyślnej przełącznika do przesyłania pakietów do zdalnego celu.", "Przełącznik musi mieć bramę domyślną, aby był dostępny przez Telnet i SSH.", "Adres bramy domyślnej służy do przesyłania pakietów pochodzących z przełącznika do sieci zdalnych.", "Zapewnia on adres następnego skoku dla całego ruchu przepływającego przez przełącznik."], ans: [2], type: "single" },
    { q: "Jaka jest podstawowa cecha protokołu IP?", opts: ["bezpołączeniowy", "zależny od mediów", "segmentacja danych użytkownika", "niezawodne dostarczanie typu end-to-end"], ans: [0], type: "single" },
    { q: "Które pole w nagłówku IPv4 służy do zapobiegania nieskończonemu krążeniu pakietu w sieci?", opts: ["Time-to-Live", "Sequence Number", "Acknowledgment Number", "Differentiated Services"], ans: [0], type: "single" },
    { q: "Jaka jest jedna z zalet, jakie oferuje uproszczony nagłówek IPv6 w porównaniu z IPv4?", opts: ["nagłówek o mniejszym rozmiarze", "mniejsze wymagania dotyczące przetwarzania sum kontrolnych", "mniejsze rozmiary źródłowych i docelowych adresów IP", "wydajna obsługa pakietów"], ans: [3], type: "single" },
    { q: "Które pole nagłówka IPv4 identyfikuje protokół wyższej warstwy przenoszony w pakiecie?", opts: ["Protocol", "Identification", "Version", "Differentiated Services"], ans: [0], type: "single" },
    { q: "Dopasuj pakiety na podstawie ich docelowych adresów IP do odpowiednich interfejsów wyjściowych routera.", opts: ["172.17.6.15 -> FastEthernet0/0, 172.17.14.8 -> FastEthernet0/1, 172.17.12.10 -> FastEthernet1/0, 172.17.10.5 -> FastEthernet1/1, 172.17.8.20 -> Serial0/0/0"], ans: [0], type: "single" },
    { q: "Jaką informację dostarcza test pętli zwrotnej (loopback)?", opts: ["Stos TCP/IP na urządzeniu działa poprawnie.", "Urządzenie posiada łączność typu end-to-end.", "DHCP działa poprawnie.", "Kabel Ethernet działa poprawnie.", "Urządzenie posiada poprawny adres IP w sieci."], ans: [0], type: "single" },
    { q: "Który wpis w tablicy routingu posiada adres następnego skoku (next hop) powiązany z siecią docelową?", opts: ["trasy bezpośrednio podłączone (directly-connected routes)", "trasy lokalne (local routes)", "trasy zdalne (remote routes)", "trasy źródłowe CiL"], ans: [2], type: "single" },
    { q: "W jaki sposób hosty upewniają się, że ich pakiety są kierowane do właściwego miejsca docelowego w sieci?", opts: ["Muszą utrzymywać własną lokalną tablicę routingu, która zawiera trasę do interfejsu loopback, trasę do sieci lokalnej oraz zdalną trasę domyślną.", "Zawsze kierują swoje pakiety do bramy domyślnej, która jest odpowiedzialna za dostarczenie pakietu.", "Przeszukują własną lokalną tablicę routingu w poszukiwaniu trasy do adresu sieci docelowej i przekazują tę informację do bramy domyślnej.", "Wysyłają pakiet zapytania do bramy domyślnej z pytaniem o najlepszą trasę."], ans: [0], type: "single" },
    { q: "Podczas przesyłania danych z aplikacji czasu rzeczywistego, takich jak streaming audio i wideo, które pole w nagłówku IPv6 może być użyte do poinformowania routerów i przełączników o konieczności utrzymania tej samej ścieżki dla pakietów w ramach tej samej rozmowy?", opts: ["Next Header", "Flow Label", "Traffic Class", "Differentiated Services"], ans: [1], type: "single" },
    { q: "Które stwierdzenie opisuje funkcję protokołu Address Resolution Protocol (ARP)?", opts: ["ARP służy do odnajdywania adresu IP dowolnego hosta w innej sieci.", "ARP służy do odnajdywania adresu IP dowolnego hosta w sieci lokalnej.", "ARP służy do odnajdywania adresu MAC dowolnego hosta w innej sieci.", "ARP służy do odnajdywania adresu MAC dowolnego hosta w sieci lokalnej."], ans: [3], type: "single" },
    { q: "W jakich dwóch sytuacjach przełącznik roześle (flood) ramkę przez wszystkie porty z wyjątkiem portu, na którym ramka została odebrana? (Wybierz dwie).", opts: ["Ramka posiada adres rozgłoszeniowy (broadcast) jako adres docelowy.", "Adres docelowy jest nieznany przełącznikowi.", "Adres źródłowy w nagłówku ramki jest adresem rozgłoszeniowym.", "Adres źródłowy w ramce jest adresem grupowym (multicast).", "Adres docelowy w ramce jest znanym adresem emisji pojedynczej (unicast)."], ans: [0, 1], type: "multiple" },
    { q: "Które stwierdzenie opisuje sposób traktowania żądań ARP w łączu lokalnym?", opts: ["Muszą być one przekazywane przez wszystkie routery w sieci lokalnej.", "Są one odbierane i przetwarzane przez każde urządzenie w sieci lokalnej.", "Są one odrzucane przez wszystkie przełączniki w sieci lokalnej.", "Są one odbierane i przetwarzane tylko przez urządzenie docelowe."], ans: [1], type: "single" },
    { q: "Jaki adres docelowy jest używany w ramce żądania ARP?", opts: ["0.0.0.0", "255.255.255.255", "FFFF.FFFF.FFFF", "AAAA.AAAA.AAAA", "adres fizyczny hosta docelowego"], ans: [2], type: "single" },
    { q: "Technik sieciowy wydaje polecenie arp -d na komputerze PC po rekonfiguracji routera podłączonego do sieci LAN. Jaki jest wynik po wydaniu tego polecenia?", opts: ["Pamięć podręczna ARP zostaje wyczyszczona.", "Wyświetlana jest aktualna zawartość pamięci podręcznej ARP.", "Wyświetlane są szczegółowe informacje o pamięci podręcznej ARP.", "Pamięć podręczna ARP zostaje zsynchronizowana z interfejsem routera."], ans: [0], type: "single" },
    { q: "Zobacz rysunek. Przedstawia on niewielką sieć przełączaną oraz zawartość tablicy adresów MAC przełącznika. PC1 wysłał ramkę zaadresowaną do PC3. Co przełącznik zrobi z tą ramką?", opts: ["Przełącznik odrzuci ramkę.", "Przełącznik przekaże ramkę tylko do portu 2.", "Przełącznik przekaże ramkę do wszystkich portów z wyjątkiem portu 4.", "Przełącznik przekaże ramkę do wszystkich portów.", "Przełącznik przekaże ramkę tylko do portów 1 i 3."], ans: [2], type: "single" },
    { q: "Jakie dwa rodzaje komunikatów IPv6 są używane zamiast ARP do rozpoznawania adresów? (Wybierz dwie).", opts: ["anycast", "broadcast", "echo reply", "echo request", "neighbor solicitation", "neighbor advertisement"], ans: [4, 5], type: "multiple" },
    { q: "Jaki jest cel ataku typu ARP spoofing?", opts: ["zalanie sieci rozgłoszeniami odpowiedzi ARP (ARP reply)", "zapełnienie tablic adresów MAC przełączników fałszywymi adresami", "powiązanie adresów IP z błędnymi adresami MAC", "przytłoczenie hostów sieciowych żądaniami ARP"], ans: [2], type: "single" },
    { q: "Zobacz rysunek. PC1 próbuje połączyć się z serwerem File_server1 i wysyła żądanie ARP w celu uzyskania docelowego adresu MAC. Który adres MAC otrzyma PC1 w odpowiedzi ARP?", opts: ["adres MAC przełącznika S1", "adres MAC interfejsu G0/0 na routerze R1", "adres MAC interfejsu G0/0 na routerze R2", "adres MAC przełącznika S2", "adres MAC serwera File_server1"], ans: [1], type: "single" },

let currentQuestion;
let score = 0;
let questionIndex = 0;
let userSelections = [];
let availableQuestions = [];
let randomizedOptions = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const checkBtn = document.getElementById("check-btn");
const nextBtn = document.getElementById("next-btn");

function initQuiz() {
    availableQuestions = [...allQuizData].sort(() => Math.random() - 0.5);
    score = 0;
    questionIndex = 0;
    document.getElementById("current-score").innerText = 0;
    document.getElementById("total-questions").innerText = availableQuestions.length;
    document.getElementById("quiz-block").style.display = "block";
    document.getElementById("results-block").style.display = "none";
    loadNextQuestion();
}

function loadNextQuestion() {
    if (questionIndex >= availableQuestions.length) {
        showResults();
        return;
    }

    currentQuestion = availableQuestions[questionIndex];
    userSelections = [];

    document.getElementById("question-counter").innerText = questionIndex + 1;
    questionEl.innerText = currentQuestion.q;

    const hintEl = document.getElementById("multi-hint");
    if (currentQuestion.type === "multiple") {
        hintEl.innerText = `(Wybierz ${currentQuestion.ans.length} poprawne odpowiedzi)`;
    } else {
        hintEl.innerText = "";
    }

    randomizedOptions = currentQuestion.opts.map((text, index) => ({
        text: text,
        isCorrect: currentQuestion.ans.includes(index)
    })).sort(() => Math.random() - 0.5);

    optionsEl.innerHTML = "";
    checkBtn.disabled = true;
    checkBtn.style.display = "block";
    nextBtn.style.display = "none";

    randomizedOptions.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `<input type="checkbox"><label>${opt.text}</label>`;
        div.onclick = () => toggle(i, div);
        optionsEl.appendChild(div);
    });
}

function toggle(i, el) {
    if (el.classList.contains("disabled")) return;

    if (currentQuestion.type === "single") {
        document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
        userSelections = [i];
        el.classList.add("selected");
        checkBtn.disabled = false;
    } else {
        if (userSelections.includes(i)) {
            userSelections = userSelections.filter(x => x !== i);
            el.classList.remove("selected");
        } else {
            userSelections.push(i);
            el.classList.add("selected");
        }
        checkBtn.disabled = userSelections.length !== currentQuestion.ans.length;
    }
}

function checkAnswer() {
    let isCorrect = true;
    const optionsList = document.querySelectorAll(".option");
    
    optionsList.forEach(o => o.classList.add("disabled"));

    const correctCount = randomizedOptions.filter(o => o.isCorrect).length;
    let userCorrectCount = 0;

    userSelections.forEach(index => {
        if (randomizedOptions[index].isCorrect) {
            userCorrectCount++;
        } else {
            isCorrect = false; 
        }
    });

    if (userCorrectCount !== correctCount) isCorrect = false;

    randomizedOptions.forEach((opt, index) => {
        const optionEl = optionsList[index];
        const isSelected = userSelections.includes(index);

        if (opt.isCorrect) {
            optionEl.classList.add("correct");
        } else if (isSelected && !opt.isCorrect) {
            optionEl.classList.add("incorrect");
        }
    });

    if (isCorrect) {
        score++;
        document.getElementById("current-score").innerText = score;
        document.getElementById("sound-correct").play();
        spawnParticles();
        document.getElementById("quizBox").classList.add("correct-anim");
    } else {
        document.getElementById("sound-wrong").play();
        document.getElementById("quizBox").classList.add("wrong-anim");
    }

    setTimeout(() => {
        document.getElementById("quizBox").classList.remove("correct-anim", "wrong-anim");
    }, 500);

    checkBtn.style.display = "none";
    nextBtn.style.display = "block";
    questionIndex++;
}

function showResults() {
    document.getElementById("quiz-block").style.display = "none";
    document.getElementById("results-block").style.display = "block";
    document.getElementById("final-score").innerText = score;
    document.getElementById("final-total").innerText = availableQuestions.length;
}

function restartQuiz() { initQuiz(); }

function spawnParticles() {
    for (let i = 0; i < 15; i++) {
        const img = document.createElement("img");
        img.src = "https://github.com/majchrzakp2005/majchrzakp2005.github.io/blob/main/bidul.jpg?raw=true";
        img.className = "particle";
        img.style.left = (window.innerWidth / 2 - 100) + "px";
        img.style.top = (window.innerHeight / 2 - 100) + "px";
        img.style.setProperty("--x", (Math.random() - 0.5) * 800 + "px");
        img.style.setProperty("--y", (Math.random() - 0.5) * 800 + "px");
        document.body.appendChild(img);
        setTimeout(() => img.remove(), 1500);
    }
}

window.onload = initQuiz;
</script>
